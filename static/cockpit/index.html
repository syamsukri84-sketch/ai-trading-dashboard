<!doctype html>
<html lang="id">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>AI Trading Cockpit</title>
  <style>
    :root {
      --bg: #f5f7f8;
      --panel: #ffffff;
      --text: #17202a;
      --muted: #607080;
      --line: #d9e1e7;
      --green: #147d73;
      --red: #b42318;
      --amber: #a15c07;
      --dark: #263238;
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      font-family: Inter, ui-sans-serif, system-ui, -apple-system, Segoe UI, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }
    header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding: 18px 24px;
      border-bottom: 1px solid var(--line);
      background: #fff;
      position: sticky;
      top: 0;
      z-index: 5;
    }
    h1 { margin: 0; font-size: 22px; font-weight: 750; }
    .sub { color: var(--muted); font-size: 13px; margin-top: 3px; }
    button {
      border: 1px solid var(--green);
      background: var(--green);
      color: #fff;
      height: 36px;
      padding: 0 14px;
      border-radius: 6px;
      font-weight: 700;
      cursor: pointer;
    }
    main { padding: 20px 24px 32px; max-width: 1440px; margin: 0 auto; }
    .grid {
      display: grid;
      grid-template-columns: repeat(6, minmax(120px, 1fr));
      gap: 12px;
      margin-bottom: 16px;
    }
    .metric, .panel {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 8px;
    }
    .metric { padding: 14px; min-height: 86px; }
    .metric .label { color: var(--muted); font-size: 12px; font-weight: 700; text-transform: uppercase; }
    .metric .value { margin-top: 8px; font-size: 24px; font-weight: 800; }
    .panel { padding: 16px; margin-top: 16px; }
    .panel-head {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 12px;
    }
    h2 { margin: 0; font-size: 17px; }
    .pill {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: 72px;
      height: 26px;
      padding: 0 9px;
      border-radius: 999px;
      font-size: 12px;
      font-weight: 800;
      border: 1px solid transparent;
    }
    .BUY { background: #e6f4ef; color: #0f6b5f; border-color: #b8ded5; }
    .WATCH { background: #fff7e6; color: var(--amber); border-color: #f2d19b; }
    .AVOID { background: #fdecec; color: var(--red); border-color: #f4b7b2; }
    .NO_EDGE { background: #eceff1; color: var(--dark); border-color: #cfd8dc; }
    .toolbar {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 10px;
    }
    input {
      width: 280px;
      max-width: 100%;
      height: 36px;
      border: 1px solid var(--line);
      border-radius: 6px;
      padding: 0 10px;
      font-size: 14px;
      background: #fff;
    }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    th, td {
      padding: 10px 9px;
      border-bottom: 1px solid var(--line);
      text-align: left;
      white-space: nowrap;
    }
    th {
      color: #475866;
      font-size: 12px;
      text-transform: uppercase;
      background: #fafbfc;
      position: sticky;
      top: 73px;
      z-index: 3;
    }
    td.num, th.num { text-align: right; }
    .table-wrap { overflow: auto; max-height: 68vh; border: 1px solid var(--line); border-radius: 8px; }
    .muted { color: var(--muted); }
    .error { color: var(--red); font-weight: 700; }
    @media (max-width: 980px) {
      header { align-items: flex-start; flex-direction: column; }
      .grid { grid-template-columns: repeat(2, minmax(120px, 1fr)); }
      th { top: 116px; }
    }
  </style>
</head>
<body>
  <header>
    <div>
      <h1>AI Trading Cockpit</h1>
      <div class="sub">Dashboard harian ringan. Streamlit tetap untuk audit lengkap.</div>
    </div>
    <button id="refreshBtn" type="button">Refresh</button>
  </header>
  <main>
    <section class="grid" id="metrics"></section>
    <section class="panel">
      <div class="panel-head">
        <div>
          <h2>Rencana Harian</h2>
          <div class="sub" id="generatedAt">Memuat data...</div>
        </div>
      </div>
      <div class="toolbar">
        <input id="searchBox" type="search" placeholder="Filter ticker atau sinyal">
        <div class="muted" id="rowCount"></div>
      </div>
      <div class="table-wrap">
        <table>
          <thead>
            <tr>
              <th>Saham</th>
              <th>Sinyal</th>
              <th class="num">Harga</th>
              <th class="num">Target H+3</th>
              <th class="num">Potensi</th>
              <th>Arah H+1</th>
              <th class="num">Confidence</th>
              <th class="num">Akurasi</th>
              <th class="num">Evaluasi</th>
              <th>Edge</th>
              <th>Tanggal</th>
            </tr>
          </thead>
          <tbody id="rows"></tbody>
        </table>
      </div>
    </section>
    <section class="panel">
      <div class="panel-head">
        <h2>Workflow Terakhir</h2>
      </div>
      <div id="workflow" class="muted">Memuat workflow...</div>
    </section>
  </main>
  <script>
    let recommendations = [];

    const fmtNum = (value, digits = 0) => {
      const num = Number(value || 0);
      return num.toLocaleString("id-ID", { maximumFractionDigits: digits, minimumFractionDigits: digits });
    };
    const fmtPct = (value) => `${fmtNum(value, 2)}%`;
    const edgeLabel = (value) => value === true ? "Lolos" : value === false ? "Belum" : "N/A";

    function renderMetrics(status) {
      const items = [
        ["Data Lokal", `${status.raw_count}/${status.ticker_count}`],
        ["Tanggal Data", status.latest_data_date || "-"],
        ["Tanggal Prediksi", status.latest_prediction_date || "-"],
        ["Prediksi Aktif", fmtNum(status.active_prediction_count)],
        ["Pending", fmtNum(status.pending_count)],
        ["Akurasi Log", fmtNum(status.accuracy_rows)],
      ];
      document.getElementById("metrics").innerHTML = items.map(([label, value]) => `
        <div class="metric"><div class="label">${label}</div><div class="value">${value}</div></div>
      `).join("");
    }

    function renderRows() {
      const query = document.getElementById("searchBox").value.trim().toUpperCase();
      const visible = recommendations.filter(row => !query || `${row.ticker} ${row.signal}`.includes(query));
      document.getElementById("rowCount").textContent = `${visible.length} baris`;
      document.getElementById("rows").innerHTML = visible.map(row => `
        <tr>
          <td><strong>${row.ticker}</strong></td>
          <td><span class="pill ${row.signal}">${row.signal}</span></td>
          <td class="num">${fmtNum(row.current_price)}</td>
          <td class="num">${fmtNum(row.target_price_h3)}</td>
          <td class="num">${fmtPct(row.projected_return_pct)}</td>
          <td>${row.direction_h1 || "-"}</td>
          <td class="num">${fmtPct(row.confidence_pct)}</td>
          <td class="num">${fmtPct(row.accuracy_pct)}</td>
          <td class="num">${fmtNum(row.evaluations)}</td>
          <td>${edgeLabel(row.has_genuine_edge)}</td>
          <td>${row.prediction_date || "-"}</td>
        </tr>
      `).join("");
    }

    function renderWorkflow(workflow) {
      if (!workflow) {
        document.getElementById("workflow").textContent = "Belum ada ringkasan workflow harian.";
        return;
      }
      const steps = (workflow.steps || []).map(step => `${step.step}: ${step.status}`).join(" | ");
      document.getElementById("workflow").innerHTML = `
        <strong>Status ${workflow.status || "-"}</strong>
        <span class="muted">mulai ${workflow.started_at || "-"}, selesai ${workflow.finished_at || "-"}.</span>
        <div>${steps || "Tidak ada detail step."}</div>
        <div class="sub">${workflow._file || ""}</div>
      `;
    }

    async function loadCockpit() {
      document.getElementById("refreshBtn").disabled = true;
      try {
        const response = await fetch("/api/cockpit/summary?limit=80", { cache: "no-store" });
        if (!response.ok) throw new Error(`HTTP ${response.status}`);
        const payload = await response.json();
        recommendations = payload.recommendations || [];
        renderMetrics(payload.status || {});
        renderRows();
        renderWorkflow((payload.status || {}).latest_workflow);
        document.getElementById("generatedAt").textContent = `Diperbarui ${payload.generated_at || "-"}`;
      } catch (error) {
        document.getElementById("generatedAt").innerHTML = `<span class="error">Gagal memuat data: ${error.message}</span>`;
      } finally {
        document.getElementById("refreshBtn").disabled = false;
      }
    }

    document.getElementById("refreshBtn").addEventListener("click", loadCockpit);
    document.getElementById("searchBox").addEventListener("input", renderRows);
    loadCockpit();
  </script>
</body>
</html>
